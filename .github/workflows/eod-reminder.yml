name: EOD Reminder

on:
  # Round 1: 18:00 MSC (15:00 UTC) on weekdays
  schedule:
    - cron: '0 15 * * 1-5'

  # Manual trigger
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''
      round:
        description: 'Reminder round (1 or 2)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send EOD Reminders
        working-directory: eod-inspector
        run: |
          ARGS="--round=${{ github.event.inputs.round || '1' }}"
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            ARGS="$ARGS ${{ github.event.inputs.target_date }}"
          fi
          node reminder.js $ARGS
