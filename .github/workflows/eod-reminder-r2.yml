name: EOD Reminder Round 2

on:
  # Round 2: 19:00 MSC (16:00 UTC) on weekdays
  schedule:
    - cron: '0 16 * * 1-5'

  # Manual trigger
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send EOD Reminders (Round 2)
        working-directory: eod-inspector
        run: |
          ARGS="--round=2"
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            ARGS="$ARGS ${{ github.event.inputs.target_date }}"
          fi
          node reminder.js $ARGS
