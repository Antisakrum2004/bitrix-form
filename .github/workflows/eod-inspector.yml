name: EOD Inspector

on:
  # Auto-run at 20:00 MSC (17:00 UTC) on weekdays (Mon-Fri)
  schedule:
    - cron: '0 16 * * 1-5'

  # Manual trigger with optional parameters
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''
      report_mode:
        description: 'Where to send report: group (Общий чат) or private (личка Андрей)'
        required: false
        default: 'group'
        type: choice
        options:
          - group
          - private

jobs:
  inspect:
    runs-on: ubuntu-latest

    env:
      REPORT_MODE: ${{ github.event.inputs.report_mode || 'group' }}
      REPORT_CHAT_ID: '2'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run EOD Inspector
        working-directory: eod-inspector
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            ARGS="$ARGS ${{ github.event.inputs.target_date }}"
          fi
          node inspector.js $ARGS

      - name: Send Productivity Rating
        working-directory: eod-inspector
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            ARGS="$ARGS ${{ github.event.inputs.target_date }}"
          fi
          node productivity.js $ARGS
